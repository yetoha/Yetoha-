<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yetoha - Pi App Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f9f9f9; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { color: #666; font-size: 14px; }
        .pay-btn { background-color: #673AB7; color: white; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
        #status { margin-top: 15px; font-weight: bold; color: #e91e63; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to Yetoha</h1>
    <p>Click below to authorize and complete your developer setup transaction.</p>
    <button class="pay-btn" onclick="handleAuthAndPayment()">Pay 1 Test Pi</button>
    <div id="status">Ready to test.</div>
</div>

<script>
    // Initialize Pi SDK in Sandbox Mode
    Pi.init({ version: "2.0", sandbox: true });

    function handleAuthAndPayment() {
        const statusDiv = document.getElementById('status');
        statusDiv.style.color = "#673AB7";
        statusDiv.innerText = "Step 1: Requesting 'payments' permission...";

        // Step 1: Authenticate and explicitly request permissions first
        Pi.authenticate(['payments'], function(incompletePayment) {
            console.log("Incomplete payment detected:", incompletePayment);
        }).then(function(auth) {
            // This block ONLY runs if authentication succeeds!
            statusDiv.style.color = "orange";
            statusDiv.innerText = "Step 2: Permission granted! Opening wallet...";

            // Step 2: Create the payment now that we definitely have the scope
            return Pi.createPayment({
                amount: 1.0,
                memo: "Testing Yetoha App Production Setup",
                metadata: { appId: "Yetoha" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "Payment ready! Please sign in your wallet overlay.";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "Finalizing transaction on blockchain...";
                },
                onCancel: function(paymentId) {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Transaction cancelled.";
                },
                onError: function(error, payment) {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Payment Error: " + error.message;
                }
            });
        }).catch(function(error) {
            // If the login/scope step fails, show it here
            statusDiv.style.color = "red";
            statusDiv.innerText = "Authentication Failed: " + error.message;
        });
    }
</script>

</body>
</html>
