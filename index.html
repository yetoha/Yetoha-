<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yetoha - Pi Checkout Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f3f4f6; }
        .box { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #111827; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        button { background: #4f46e5; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        #log { margin-top: 20px; padding: 12px; background: #f9fafb; border-radius: 8px; font-size: 13px; color: #374151; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="box">
    <h2>Yetoha App Setup</h2>
    <p>Complete your production checklist with a Testnet payment.</p>
    
    <button id="action-btn" onclick="runPiFlow()">Start Test Payment</button>
    <div id="log">Status: Ready. Tap the button above.</div>
</div>

<script>
    // Initialize Pi SDK configuration
    Pi.init({ version: "2.0", sandbox: true });
    
    const logDiv = document.getElementById('log');
    
    function showLog(text) {
        logDiv.innerText = text;
        console.log(text);
    }

    async function runPiFlow() {
        showLog("Step 1: Authenticating user identity...");
        
        try {
            // Explicitly request permissions array assignment
            const authResponse = await Pi.authenticate(['payments'], function(incompletePayment) {
                showLog("Found an incomplete payment. ID: " + incompletePayment.identifier);
            });
            
            showLog("Authentication complete! Username: " + authResponse.user.username + "\n\nStep 2: Building payment window...");

            // Trigger actual layout constructor
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "Verifying Yetoha Production Stack",
                metadata: { developer: "Yetoha" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    showLog("Payment created! ID: " + paymentId + "\n\nWaiting for your wallet action...");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    showLog("Transaction captured on-chain!\nTxID: " + txid);
                },
                onCancel: function(paymentId) {
                    showLog("Payment cancelled by user.");
                },
                onError: function(error, payment) {
                    showLog("Payment interface error: " + error.message);
                }
            });
            
            showLog("Success! Payment complete.");
            
        } catch (err) {
            showLog("Error context: " + err.message);
        }
    }
</script>

</body>
</html>
